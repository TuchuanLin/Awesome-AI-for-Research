                  - emphasis [ref=e2448]: "SAVVY: Spatial Awareness via Audio-Visual LLMs through Seeing and Hearing"
                - paragraph [ref=e2449]:
                  - text: SAVVY predicts distances between ego-centric and exo-centric views; gains came from calibrating those distances rather than from a bigger model. The pipeline mixed Stable-Diffusion text, piecewise ego/exo scales with clipping, and a final nudge to ego
                  - code [ref=e2450]: lo_scale
                  - text: so predicted geometry better matches supervised distances.
                - paragraph [ref=e2451]: The closed-loop run exceeded its target comfortably; the emphasis is on stable calibration and bounded outputs rather than on novel architectures.
