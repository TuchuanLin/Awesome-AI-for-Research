                  - emphasis [ref=e2476]: Discount Model Search for Quality Diversity Optimization in High-Dimensional Measure Spaces
                - paragraph [ref=e2477]: Quality–diversity here is driven by a multi-emitter CMA-ES style search. Increasing emitters per domain (15→20) adds parallel search threads with diverse covariances, which improves coverage of the measure space and raises the averaged QD score across benchmark domains without changing the core algorithm.
                - paragraph [ref=e2478]: The change is simple to describe but effective because diversity metrics are sensitive to how many independent search processes are exploring at once.
