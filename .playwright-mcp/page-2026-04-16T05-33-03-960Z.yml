                  - emphasis [ref=e2462]: "PINet: Optimizing hard-constrained neural networks with orthogonal projection layers"
                - paragraph [ref=e2463]:
                  - text: PINet’s cost driver is the differentiable projection solve inside the loop. The best configuration cut test-time DR iterations (
                  - code [ref=e2464]: n_iter_test
                  - text: 50→10) because the bundled QP is small and was over-solved, disabled JAX float64 in favor of float32 on A100, and swapped ReLU for SiLU to match fused kernels better.
                - paragraph [ref=e2465]: Together these give a clear drop in small-batch inference time versus the paper baseline while still meeting the hard feasibility constraints the method is built around.
