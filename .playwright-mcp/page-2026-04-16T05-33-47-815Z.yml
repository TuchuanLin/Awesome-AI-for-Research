          - text: systems have demonstrated the value of hyperparameter tuning and architecture search, while newer LLM-based systems have shown impressive capabilities in code generation, debugging, and restricted forms of algorithm discovery. At the same time, emerging autonomous AI scientist systems have begun to explore broader research workflows. However, most existing approaches still operate on relatively narrow problem formulations. For instance, even the latest iterative frameworks like AutoResearch
          - generic [ref=e123]:
            - text: "["
            - link "6" [ref=e124] [cursor=pointer]:
              - /url: "#bib.bib65"
            - text: "]"
          - text: strictly confine the agent to improving a single bounded code module within a sanitized sandbox, entirely sidestepping the complexities of environment setup. They typically do not solve the full end-to-end problem of starting from an unstructured research paper, recovering the corresponding executable environment, reproducing the reported baseline, and then performing valid, open-ended methodological reflection under realistic constraints. This gap motivates the need for an end-to-end automated AI research system that can bridge unstructured literature, experiment environments setup, and high-level reflection in a single closed-loop framework.
        - paragraph [ref=e126]: In this work, we formulate this challenge as an end-to-end discovery problem that maps a top-tier AI paper to an improved executable repository whose empirical performance surpasses the original method. To make this open-ended task tractable, we decompose it into three tightly coupled sub-problems. The first is resource preparation and goal setting, which requires grounding a paper into a concrete experimental task by locating repositories, datasets, base models, and the exact target metric to be exceeded. The second is experiment evaluation, which requires transforming incomplete and noisy academic code into a runnable baseline that faithfully approximates the reported results despite missing scripts, broken dependencies, and long-horizon debugging challenges. The third is reflection and ideation, which elevates the system from a mere replication engine to an autonomous scientific discoverer. At this stage, the system is tasked with uncovering genuine algorithmic improvements—exploring structural innovations, novel learning objectives, and optimized implementation strategies—while intelligently balancing open-ended exploration against the exorbitant computational cost of real-world trials. Together, these three sub-problems define the core scientific and engineering bottlenecks that any end-to-end automated research system must solve.
        - paragraph [ref=e128]: To address these challenges, we introduce AutoSOTA, a multi-agent framework designed to mimic the division of labor in human AI research. AutoSOTA decomposes the workflow across eight specialized agents organized into the three stages above. In the preparation stage, AgentResource grounds research papers to repositories and external dependencies, while AgentObjective constructs a tree-structured evaluation rubric that translates the paper’s macro goal into dense, verifiable feedback. In the replication stage, AgentInit builds the executable environment, AgentMonitor tracks long-horizon execution and prevents deadlock, and AgentFix performs timely repair of runtime failures. In the reflection stage, AgentIdeator constructs a constrained hypothesis library, AgentScheduler manages iterative optimization across code states and compute resources, and AgentSupervisor enforces a red-line system that prevents invalid metric gains caused by evaluation leakage, protocol violations, or other shortcuts. Through this modular design, AutoSOTA converts fragmented academic artifacts into an execution-ready optimization loop and supports stable, scalable, and scientifically comparable SOTA-oriented research automation.
        - paragraph [ref=e130]: We evaluate AutoSOTA on the research papers drawn from eight top-tier AI conferences, after filtering for methodological relevance, public code availability, repository readiness, and tractable execution cost. Across these curated research papers, AutoSOTA demonstrates strong end-to-end performance in both automated replication and subsequent optimization, successfully discovering new SOTA models for 105 papers. Remarkably, the system yields an average performance improvement of nearly 10% over the original main methods, requiring only about five hours of execution time per paper. We further presents case studies spanning research subfields of LLM, NLP, computer vision, time series, and optimization, illustrating that the framework is capable not only of hyperparameter tuning but also of more substantive architectural, algorithmic, and workflow-level interventions. These results suggest that end-to-end research automation is no longer limited to narrow coding tasks, but can support broad empirical advancement across heterogeneous AI research areas.
        - paragraph [ref=e132]: "More broadly, the significance of AutoSOTA lies beyond raw benchmark improvement. As described in the project vision, the system is intended not merely as an optimizer, but as a new research infrastructure for AI science itself: one that can absorb the tedious, high-frequency cycle of experimental iteration and thereby amplify human creativity. In this sense, AutoSOTA points toward a shift in the research paradigm. Instead of treating scientific automation as a tool for isolated assistance, it suggests the possibility of tightly coupled human–AI collaboration in which automated agents handle large-scale execution, reproduction, and reflection, while human scientists redirect their attention toward deeper conceptual innovation and more disruptive questions. Such a direction does not diminish the role of human researchers. Rather, it sharpens it by moving human effort away from repetitive optimization and back toward the irreplaceable core of scientific discovery."
