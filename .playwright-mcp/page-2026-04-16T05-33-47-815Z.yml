          - generic [ref=e745]:
            - heading "2.5.1 Execution Trace Monitoring and Deadlock Intervention" [level=4] [ref=e746]:
              - generic [ref=e747]: 2.5.1
              - text: Execution Trace Monitoring and Deadlock Intervention
            - paragraph [ref=e749]: In our current realization, AgentMonitor is tightly coupled to a structured execution trace. The execution agent runs in a streamed mode that exposes assistant outputs, tool invocations, execution results, and termination signals in real time. AgentMonitor continuously parses this trace to estimate the current phase of execution, such as environment setup, dependency installation, experiment launch, evaluation, reporting, or failure handling. This phase-aware tracking allows the monitor to distinguish productive exploration from pathological repetition. For example, repeated environment edits with no successful state transition, repeated installation attempts on the same failing dependency, or long stretches of output without progress can all be recognized as indicators of a dead-end trajectory.
            - paragraph [ref=e751]:
              - text: Once such a state is detected, AgentMonitor generates
              - emphasis [ref=e752]: high-level corrective guidance
              - text: rather than low-level patch instructions. This distinction is important. The monitor should steer the agent back toward a more promising region of the search space without collapsing the autonomy of the main agent into brittle hand-coded control. Typical supervisory actions include instructing the agent to switch from automated environment construction to manual Docker setup, to consult a dedicated failure-handling skill before making another installation attempt, to stop pursuing a low-probability fix and report failure for the current branch, or to resume execution from a clarified objective. This high-level intervention design preserves agent flexibility while still preventing unbounded local search.
            - paragraph [ref=e754]:
              - text: AgentMonitor also serves as the system’s
              - emphasis [ref=e755]: global budget and safety controller
              - text: . Replication is subject to strict time and compute limits, and the system must remain responsive to stalled or runaway processes. Accordingly, the monitor tracks remaining wall-clock budget, limits the number of interaction rounds, terminates execution when timeout thresholds are crossed, and forces process-group cleanup when the run becomes unresponsive. In more advanced optimization settings, the same supervisory mechanism can trigger rollback to previously validated states when a new branch causes severe regression or persistent instability.
          - generic [ref=e756]:
            - heading "2.5.2 Persistent Context Management via External Memory" [level=4] [ref=e757]:
              - generic [ref=e758]: 2.5.2
              - text: Persistent Context Management via External Memory
            - paragraph [ref=e760]: A fundamental challenge in long-horizon code optimization is managing state and context over extensive iterative processes. Each iteration involves a large volume of information, including the codebase, evaluation outputs, historical modification records, the current idea pool, and accumulated research insights, which collectively exceed the capacity of a single LLM context window.
            - paragraph [ref=e762]: "To address this limitation, AgentMonitor maintains a structured external memory architecture that persists critical state in the form of local documents:"
            - list [ref=e764]:
              - listitem [ref=e765]:
                - text: •
                - paragraph [ref=e767]: "code_analysis.md: A code cognition map constructed via a one-time comprehensive exploration of the target repository. It captures the full pipeline workflow, key source files and their responsibilities, evaluation procedures, script entry points, and immutable experimental constraints. This document serves as the primary entry point for subsequent code localization and reasoning."
              - listitem [ref=e768]:
                - text: •
                - paragraph [ref=e770]: "idea_library.md: A dynamically evolving idea pool that records all candidate ideas, attempted modifications, and their outcomes. By externalizing the optimization trajectory, it enables consistent cross-iteration reasoning even when the model’s internal state is reset."
              - listitem [ref=e771]:
                - text: •
                - paragraph [ref=e773]: "research_report.md: An external knowledge source populated prior to execution via a dedicated research phase. It provides distilled insights from relevant literature, including state-of-the-art techniques, empirically effective configurations, and concrete optimization strategies."
            - paragraph [ref=e775]: To further control context growth, the system employs two complementary mechanisms. First, a one-time distillation phase compresses the global structure of the repository into a persistent representation, eliminating the need for repeated full-repository scans. Second, during execution, the agent performs on-demand retrieval through command-line operations such as symbolic search, pattern matching, and targeted file inspection, allowing it to localize relevant code regions without loading the entire codebase into context.
            - paragraph [ref=e777]: Together, these mechanisms establish a retrieval-augmented paradigm for code optimization that tightly couples external memory with execution monitoring. This design not only bounds context usage within manageable limits, but also enables AgentMonitor to maintain a coherent global view of the optimization process across long horizons.
