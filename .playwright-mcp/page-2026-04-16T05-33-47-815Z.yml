          - paragraph [ref=e680]: "Even after a runnable initial state is constructed, autonomous paper replication remains an extreme long-horizon reasoning-and-acting problem. The agent must execute shell commands, inspect outputs, edit code, install dependencies, and iterate across many partially observed failure states. In such settings, a purely self-driven execution agent is prone to two characteristic pathologies: first, it can become trapped in local debugging loops, repeatedly attempting low-value fixes without making genuine progress; second, it may lose awareness of the global objective and over-focus on transient engineering details, such as endlessly repairing environment errors while never advancing toward the target evaluation. These failure modes are particularly acute in academic repositories, where setup and execution errors are noisy, ambiguous, and often causally entangled."
          - generic [ref=e681]:
