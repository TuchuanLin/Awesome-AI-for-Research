          - paragraph [ref=e1105]: Detailed experimental results are summarized in Table LABEL:tbl:main_4. In this table, AutoSoTA Improvement represents the performance gain achieved by AutoSOTA building upon the replicated main method of the original paper. Statistical analysis indicates that, provided all replicated results from the original main methods remain within reasonable confidence intervals, AutoSOTA not only achieves an exceptionally high automated replication success rate across diverse domains but also demonstrates superior potential for algorithmic optimization. In all tested cases, the improvement schemes automatically discovered by AutoSOTA yielded gains surpassing the original results reported in the papers, proving its capability to extract deeper performance augmentations through intelligent iteration even when operating on top-tier research foundations. Furthermore, from medical time-series analysis (e.g., ID 4) to protein binding energy prediction (e.g., ID 65), the system exhibits consistent robustness across multidisciplinary tasks, validating the generalizable potential of the framework to drive large-scale, automated, end-to-end scientific advancement while maintaining computational efficiency.
