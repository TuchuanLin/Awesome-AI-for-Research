            - generic [ref=e780]: "2.6"
            - text: "AgentFix: Resolving Runtime Conflicts"
          - paragraph [ref=e782]: "A robust replication system cannot rely on generic chain-of-thought reasoning alone to repair the diverse and recurring failures of academic software. In practice, many failure modes are not novel research problems but recurring engineering patterns: package installation timeouts, CUDA-toolchain mismatches, inaccessible model hubs, missing compiler toolchains, broken file paths, incompatible Python versions, absent checkpoints, corrupted caches, insufficient shared memory, or evaluation scripts that silently assume a different directory layout. If each failure is handled from scratch, the system wastes substantial budget rediscovering the same fixes across papers. This motivates a dedicated repair module that turns failure handling into an explicit, reusable component of the framework."
          - paragraph [ref=e784]: "We define AgentFix as the module responsible for structured diagnosis, protocol-preserving repair, and cross-task reuse of failure knowledge. Given an execution state and an observed failure, AgentFix maps the failure into a validated repair action:"
