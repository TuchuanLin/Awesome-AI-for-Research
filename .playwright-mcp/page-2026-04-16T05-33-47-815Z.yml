              - text: Case Study for Optimization Research.
            - paragraph [ref=e2643]: "We select \"MoSES: Multi-Task Vehicle Routing Solver via Mixture of Specialized Experts under State-Decomposable MDP\" to demonstrate AutoSOTA’s capability in complex, discrete constraint environments. The task focuses on solving the Capacitated Vehicle Routing Problem (CVRP), where the primary metric is the optimality gap percentage. AutoSOTA establishes an initial baseline gap of 0.914%. To optimize this hybrid neuro-symbolic solver, AutoSOTA executes a multi-layered intervention strategy. First, it modifies the neural architecture’s gating mechanism, switching the Low-Rank Adaptation (LoRA) activation function from softplus to a softmax checkpoint to improve expert specialization. Next, recognizing a log-linear scaling trend, AutoSOTA aggressively scales test-time symmetric augmentations from 8 to 128. To circumvent out-of-memory failures during this intensive exploration phase, the system autonomously downscales the batch size from 1000 to 250. Finally, AutoSOTA injects classical Operations Research heuristics for algorithmic post-processing, applying intra-route 2-opt exchanges and highly effective cross-route Or-opt single-node relocations to dynamically move customers between vehicle routes and eliminate final inefficiencies."
            - paragraph [ref=e2645]: This systematic combination of neural adjustments, inference scaling, and deterministic refinement drives the optimality gap down to 0.444%. This represents a 51.4% relative improvement over the baseline, far exceeding the predefined success target of 0.8957%. Notably, this aggressive performance gain involves a deliberate computational trade-off, expanding inference time from approximately 3.7 to 103 seconds—a compute reallocation characteristic of modern reasoning-focused search paradigms. Crucially, this case proves AutoSOTA operates effectively as a hybrid optimizer rather than treating the neural network as a mere black box. By seamlessly bridging representation tuning, brute-force state space exploration, and classical algorithmic heuristics, alongside dynamic GPU memory management, AutoSOTA demonstrates an expert-level orchestration of diverse strategies for combinatorial routing problems.
