            - paragraph [ref=e406]: AgentResource starts from conference-level metadata and converts raw paper collections into a unified local representation with standardized metadata, downloaded PDFs, and parsed text. It operates on papers from eight top-tier conferences in 2025, including ICML, ICLR, NeurIPS, AAAI, NAACL, ICCV, ACL, and CVPR. This step transforms heterogeneous conference outputs into machine-addressable paper units that can be processed by later modules. Given this normalized paper pool, AgentResource next performs paper typing to identify candidates for empirical optimization. It uses an LLM-based classifier to separate methodological papers from other categories, such as theoretical, benchmark, analysis, and position papers. The classifier is prompted to judge whether the main contribution is a new method, model, algorithm, framework, or system that is experimentally validated against baselines. This step narrows an open-domain literature pool into a set of candidate tasks with experimentally grounded objectives.
            - paragraph [ref=e408]: "For papers that pass this filter, AgentResource then carries out repository discovery and normalization. It first extracts GitHub links from the front matter of paper PDFs, covering both direct repository links and indirect project pages such as github.io sites. When a project page is found, the system crawls that page to recover the underlying repository link. If multiple candidate repositories are associated with one paper, AgentResource uses an LLM selector to identify the most relevant official repository, while filtering template repositories and removing duplicates. The selected repository is then shallow-cloned into a normalized local directory structure indexed by conference, paper ID, and repository owner. To improve recall, the workflow also performs a full-document scan when repository links are not found in the initial pass. After repository grounding, AgentResource performs a lightweight readiness assessment before more expensive execution begins downstream. For each cloned repository, the system collects three compact signals: the paper abstract, a shallow file tree of the repository, and the opening portion of the README. An LLM judge then estimates whether the repository is likely actionable for reproducing the main result, using a deliberately permissive criterion that excludes only clear placeholders or repositories that explicitly state that the code has not been released."
