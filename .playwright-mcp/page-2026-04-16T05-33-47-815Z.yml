        - heading "Abstract" [level=6] [ref=e107]
        - paragraph [ref=e108]: "Artificial intelligence research increasingly depends on prolonged cycles of reproduction, debugging, and iterative refinement to achieve State-Of-The-Art (SOTA) performance, creating a growing need for systems that can accelerate the full pipeline of empirical model optimization. In this work, we introduce AutoSOTA, an end-to-end automated research system that advances the latest SOTA models published in top-tier AI papers to reproducible and empirically improved new SOTA models. We formulate this problem through three tightly coupled stages: resource preparation and goal setting; experiment evaluation; and reflection and ideation. To tackle this problem, AutoSOTA adopts a multi-agent architecture with eight specialized agents that collaboratively ground papers to code and dependencies, initialize and repair execution environments, track long-horizon experiments, generate and schedule optimization ideas, and supervise validity to avoid spurious gains. We evaluate AutoSOTA on the recent research papers collected from eight top-tier AI conferences under filters for methodological relevance, code availability, repository readiness, and execution cost. Across these papers, AutoSOTA achieves strong end-to-end performance in both automated replication and subsequent optimization. Specifically, it successfully discovers 105 new SOTA models that surpass the original reported methods, averaging approximately five hours per paper. Case studies spanning LLMs, NLP, computer vision, time series, and optimization further show that the system can move beyond routine hyperparameter tuning to identify architectural innovation, algorithmic redesigns, and workflow-level improvements. These results suggest that end-to-end research automation can serve not only as a performance optimizer, but also as a new form of research infrastructure that reduces repetitive experimental burden and helps redirect human attention toward higher-level scientific creativity."
      - generic [ref=e109]:
        - heading "1 Introduction" [level=2] [ref=e110]:
          - generic [ref=e111]: "1"
          - text: Introduction
        - paragraph [ref=e113]:
          - text: Artificial intelligence research is increasingly organized around the pursuit of State-Of-The-Art (SOTA) performance. In many areas, the value of a new method is judged not only by conceptual novelty, but by whether it can surpass a highly competitive empirical frontier. Yet, achieving such SOTA breakthroughs is almost never the product of a standalone theoretical insight. More often, it requires a prolonged cycle of implementation, replication, debugging, evaluation, and reflection, in which months of human effort are spent translating promising insights into reproducible performance gains. This tension has become especially pronounced in modern AI, where research artifacts are distributed across papers, repositories, datasets, checkpoints, and undocumented engineering assumptions. As a result, a substantial portion of scientific attention is absorbed by repetitive experimental iteration, which might otherwise be directed toward more original, disruptive exploration. To alleviate this burden, our previous work introduced OmniScientist
          - generic [ref=e114]:
            - text: "["
            - link "17" [ref=e115] [cursor=pointer]:
              - /url: "#bib.bib67"
            - text: "]"
          - text: ", a comprehensive research agent that pushes the paradigm toward fully autonomous, end-to-end scientific discovery. Building upon this overarching framework, an important subsequent challenge is whether we can instantiate this capability into targeted automated systems that reliably accelerate the highly competitive pipeline of SOTA model optimization."
        - paragraph [ref=e117]:
          - text: Recent progress suggests that this goal is increasingly plausible, but existing efforts remain incomplete. Traditional automated machine learning (AutoML)
          - generic [ref=e118]:
            - text: "["
            - link "2" [ref=e119] [cursor=pointer]:
