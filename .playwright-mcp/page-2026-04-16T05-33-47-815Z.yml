            - paragraph [ref=e2621]: "We select Reasoning as Representation: Rethinking Visual Reinforcement Learning in Image Quality Assessment as the representative Computer Vision (CV) case because it demonstrates AutoSOTA’s ability to recognize and restructure representation bottlenecks in Vision Transformer (ViT) architectures. The paper tackles the task of Image Quality Assessment (IQA), where both global compositional aesthetics and local artifact distortions are critical for accurate evaluation. The primary evaluation metric is the Pearson Linear Correlation Coefficient (PLCC). Starting from the released implementation, AutoSOTA establishes a reproduced baseline PLCC of 0.7803."
            - paragraph [ref=e2623]: The optimization focuses on the feature aggregation stage preceding the final quality prediction head. In the original implementation, the model relied on a single pooling path to compress visual features. AutoSOTA identifies this as a potential information bottleneck and redesigns the token fusion mechanism to better capture multi-scale quality degradation. Instead of discarding spatial patch details, AutoSOTA introduces a three-way feature blending strategy. It explicitly concatenates the global CLS token with both the average-pooled (patch_mean) and max-pooled (patch_max) statistics of the spatial patch tokens, while simultaneously introducing and tuning a blending weight (alpha_cls). This architectural modification ensures that both holistic global context and salient local evidence jointly contribute to the final scoring mechanism. These targeted structural changes improve the PLCC from 0.7803 to 0.8012, an improvement of 2.68% over the baseline. This case highlights AutoSOTA’s deep empirical understanding of modern visual architectures, proving its capacity to autonomously apply classic feature-stitching paradigms to extract richer representations without necessitating larger backbone models or additional training data.
            - 'figure "Figure 11: Illustration of the CV case study." [ref=e2624]':
