          - paragraph [ref=e872]:
            - text: Within our pipeline, ideation is the stage that constructs a structured search space of admissible improvement hypotheses before any expensive optimization loop is executed. Naive idea generation can easily devolve into unconstrained metric chasing, where invalid shortcuts are mixed with legitimate improvements. Such shortcuts may include implicit changes to evaluation logic, leakage from test data, output post-processing that violates the original protocol, or alterations that invalidate comparability with the paper baseline. Therefore, AgentIdeator is framed not as brainstorming, but as protocol-respecting structured hypothesis construction, providing a risk-aware hypothesis library along with an audit record that explains why each candidate is admissible, rejected, or requires human review. In essence, AgentIdeator specifies
            - emphasis [ref=e873]: what may be optimized
