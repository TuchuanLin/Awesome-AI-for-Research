                - text: Illustration of the time series case study.
            - paragraph [ref=e2636]: "We select \"Neural MJD: Neural Non-Stationary Merton Jump Diffusion for Time Series Prediction\" to demonstrate AutoSOTA’s capacity for deep, algorithm-level intervention in complex stochastic models. The task focuses on predicting highly volatile financial data (S&P 500) using stochastic differential equations (SDEs), evaluated by test Mean Absolute Error (MAE). Starting from the released configuration, AutoSOTA establishes a reproduced baseline of 17.127, which inherently outperforms the paper’s reported 17.411. The optimization targets the high-variance bottleneck in the model’s Monte Carlo sampling of jump-diffusion paths. First, AutoSOTA dynamically scales the sampling size (n_runs), identifying 300 as the optimal sweet spot within a fixed compute budget while rejecting higher values that degrade convergence. Second, it introduces antithetic variates to the MJD sampling, generating paired positive and negative noise. This advanced statistical technique effectively reduces gradient target variance and outperforms pure scaling. Finally, AutoSOTA reallocates the conditional mean loss weight from 1.0 to 2.0, penalizing point forecast inaccuracies without overfitting."
            - paragraph [ref=e2638]: These targeted algorithmic refinements drive the MAE down to a locked-in final performance of 14.096 (peaking at 14.084 during search), representing an approximate 19.0% improvement over the original paper’s baseline. Crucially, this case highlights AutoSOTA’s dynamic optimization and strong self-correction mechanisms under resource constraints. Beyond merely recognizing the compute boundary at 300 sampling runs, the system actively filters out pseudo-optimizations. For instance, AutoSOTA tested an EMA of 0.999 and finer SDE integration steps; while these offered marginal gains in Negative Log-Likelihood (NLL), they failed to translate into MAE improvements and were thus intelligently discarded. By moving beyond surface-level hyperparameter tuning to implement domain-specific variance reduction and robust error filtering, AutoSOTA ensures practical utility and stability for highly volatile time series environments.
          - generic [ref=e2639]:
