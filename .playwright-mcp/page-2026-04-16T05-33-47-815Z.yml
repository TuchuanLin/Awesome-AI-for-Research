            - paragraph [ref=e2543]: "We use FR-Spec: Accelerating Large-Vocabulary Language Models via Frequency-Ranked Speculative Sampling as the representative LLM case because it shows how AutoSOTA can find implementation-level optimization opportunities in a complex inference system. The main gain in this case does not come from routine hyperparameter tuning. Instead, AutoSOTA identifies a hidden error in the speculative decoding path and turns that finding into a clear throughput improvement. FR-Spec studies efficient speculative decoding for large-vocabulary language models. We evaluate it with MT-Bench throughput, measured in tokens per second. Starting from the released implementation, AutoSOTA establishes a baseline of 674.58 tok/s."
            - paragraph [ref=e2545]: The optimization focuses on the speculative decoding loop. After reproducing the baseline, AutoSOTA detects abnormal acceptance behavior and traces it to an incorrect reuse of tree_draft_ids after verification. This bug corrupts the following embedding lookup, which lowers token acceptance and reduces throughput. Removing the incorrect assignment produces the largest gain. AutoSOTA then makes two further runtime improvements. It replaces a Python-side terminal-token check with a GPU-side torch.isin implementation, and it removes repeated CPU–GPU synchronization in the decoder by introducing a precomputed padding path. A final adjustment to the speculative decoding configuration yields a small additional gain. These changes increase throughput from 674.58 to 765.27 tok/s, a 13.44% improvement over the baseline. This case shows that AutoSOTA can find hidden performance bottlenecks in real LLM inference pipelines and turn code-level diagnosis into substantial efficiency gains.
