            - text: is a reusable memory of historical failures and remedies. The emphasis here is not on unrestricted debugging, but on
            - emphasis [ref=e856]: skill-augmented repair
            - text: ": before attempting arbitrary modifications, the agent is required to retrieve a relevant failure-handling procedure from a structured skill repository whenever the error matches a known category."
          - paragraph [ref=e858]:
            - text: In the current system, this design is already instantiated through explicit repair skills for high-frequency failure families. For example, package installation errors are handled through a dedicated pip-failure note that codifies known fixes such as using mirror-aware retries, installing version-compatible prebuilt wheels, downgrading incompatible build dependencies, cloning git+https packages outside the container, or switching to a development image when CUDA extensions require nvcc. Similarly, network and download failures are handled through a dedicated skill that encodes environment-specific constraints such as the lack of direct internet access inside Docker containers and the need to use mirror endpoints for HuggingFace, pip, and conda. This design principle can be summarized as
            - emphasis [ref=e859]: retrieval before repair
            - text: ": when the failure falls into a known operational class, the system first consults an explicit repair protocol rather than improvising from raw error messages."
          - paragraph [ref=e861]: "Beyond these already implemented skills, the AgentFix abstraction naturally extends to a broader repair taxonomy, including GPU visibility and driver mismatches, Python-version migration, corrupted lockfiles, file-permission errors, disk exhaustion, shared-memory insufficiency, missing utility scripts, malformed path assumptions, broken symbolic links, evaluation-command mismatches, and partial repository reconstruction. Importantly, these repairs are not allowed to alter the scientific protocol itself. AgentFix may repair the engineering path to execution, but it may not change the evaluation semantics, the dataset split, or the methodological constraints that define comparability with the original paper. In this way, AgentFix complements AgentSupervisor: the former expands the space of admissible engineering repairs, while the latter bounds that space by scientific validity."
          - paragraph [ref=e863]: A second key component of AgentFix is its failure memory mechanism. Academic repositories exhibit strong error recurrence across papers, especially within the same ecosystem of libraries, CUDA versions, and download infrastructures. To exploit this regularity, AgentFix maintains reusable memory artifacts that record encountered failures, the repairs attempted, and the outcomes of those repairs. This memory can exist at multiple levels, including per-paper local memory for the current run, cross-paper global memory for recurring operational failures, and structured knowledge notes that distill repeated successes into explicit skills. Operationally, this enables the system to normalize raw tracebacks into reusable failure signatures, retrieve historically successful repair strategies, avoid repeating previously failed actions, and gradually convert one-off debugging episodes into stable procedural knowledge.
          - paragraph [ref=e865]: This memory-augmented repair loop is especially important for preventing cyclical reasoning. A common failure mode of autonomous agents is to oscillate among semantically equivalent fixes, such as repeatedly reinstalling an incompatible package, toggling between similar commands, or alternating between two broken paths without recognizing that both belong to the same unresolved root cause. By storing normalized error signatures and associating them with attempted remedies, AgentFix can explicitly rule out already-exhausted branches and steer the system toward unexplored repair strategies. Thus, memory does not merely improve efficiency; it changes the topology of the debugging process from blind local search into progressively informed diagnosis.
          - paragraph [ref=e867]: Therefore, AgentFix serves as the operational reliability layer of AutoSOTA. It turns failure handling from an ad hoc byproduct of agent execution into a first-class component with reusable skills, explicit repair protocols, and accumulating memory. In combination, these mechanisms significantly improve the agent’s ability to recover from real-world software failures while preserving experimental comparability, thereby making large-scale autonomous replication substantially more stable and cost-effective.
