            - paragraph [ref=e2610]: "The optimization strategy in this case does not rely on tuning the neural network’s internal hyperparameters. Instead, AutoSOTA identifies that the repository already contains pre-computed prediction files from FoldX, a classical physics-based energy calculator. Recognizing that these physics-based predictions capture structural packing effects that are highly complementary to the ML-based model’s (StaB-ddG) learned representations, AutoSOTA formulates a hybrid ensemble strategy. Crucially, before fusing the predictions, AutoSOTA autonomously discovers and resolves a subtle data-alignment bug: a spacing inconsistency in the mutation string formats that previously limited the data intersection to only 63%. After fixing this string formatting to achieve a 100% row match, AutoSOTA systematically sweeps the blending weights and identifies an optimal fusion ratio of 60% StaB-ddG and 40% FoldX."
            - paragraph [ref=e2612]: This ensemble combination immediately increases the per-interface Pearson correlation from 0.4897 to 0.5655, achieving a 15.48% relative improvement in a single iteration. It also drives consistent downstream improvements across other metrics, including an 11.0% gain in overall Pearson correlation and a 7.7% reduction in per-structure RMSE. This case demonstrates AutoSOTA’s "researcher-like" intuition in computational biology tasks. It proves that the agent can autonomously diagnose dirty data alignments, intelligently leverage existing repository artifacts, and seamlessly bridge data-driven deep learning with traditional physics-based methodologies to shatter single-model performance ceilings.
