        - generic [ref=e1090]:
          - heading "3.1 Experiment Setup" [level=3] [ref=e1091]:
            - generic [ref=e1092]: "3.1"
            - text: Experiment Setup
          - paragraph [ref=e1094]: To rigorously evaluate the capability of AutoSOTA in end-to-end autonomous replication and algorithmic optimization, we construct a highly curated evaluation benchmark sourced from recent top-tier AI conferences. We initialized our data collection by gathering accepted papers published within the past year across eight premier artificial intelligence conferences (including NeurIPS, ICLR, ICML, CVPR, ICCV, ACL, NAACL, and AAAI).
          - paragraph [ref=e1096]: To ensure the selected papers are suitable for automated, closed-loop optimization, we applied a systematic, multi-stage screening protocol. First, we conducted methodological filtering. We explicitly excluded purely theoretical studies, review articles, and purely analytical papers, isolating only those that propose a novel, empirically validated method, model, or algorithm. Second, we applied an artifact availability filter, retaining only papers that provided an explicit link to a public code repository. Third, to avoid wasting computational resources on incomplete releases, we performed a readiness assessment. This step strictly filtered out repositories that consisted solely of placeholders, empty directories, or “code coming soon” README announcements, ensuring that only repositories with actual implementation logic were retained.
          - paragraph [ref=e1098]: Finally, to maintain computational tractability and ensure that the iterative optimization loop could run efficiently at scale, we imposed an execution cost constraint. We profiled the evaluation pipelines of the remaining candidates and excluded any paper where a single complete experimental replication required more than 4 GPU hours to execute.
          - paragraph [ref=e1100]: Following this rigorous, four-stage filtering process, we yielded a final, high-quality dataset of exactly 105 method-driven research papers. This diverse, multi-domain set of 105 papers serves as the primary empirical testbed for evaluating both the replication success rate and the subsequent SOTA-surpassing optimization capabilities of the AutoSOTA framework.
