          - 'heading "2.8 AgentScheduler: Lifecycle Management for Optimizing Research Codebases" [level=3] [ref=e1000]':
            - generic [ref=e1001]: "2.8"
            - text: "AgentScheduler: Lifecycle Management for Optimizing Research Codebases"
          - paragraph [ref=e1003]: "The AgentScheduler serves as the orchestration core of the optimization system, responsible for managing the complete lifecycle of a reproduced paper, from environment initialization and baseline measurement, to iterative code modification and evaluation, and finally to state persistence and result export. The Scheduler encompasses two key mechanisms: optimization strategy and resource management."
          - generic [ref=e1004]:
            - heading "2.8.1 Optimization Strategy" [level=4] [ref=e1005]:
              - generic [ref=e1006]: 2.8.1
              - text: Optimization Strategy
            - paragraph [ref=e1008]:
              - text: "The optimization workflow of the AgentScheduler is structured into four sequential phases: Environment Initialization and Baseline Measurement (Phase 0), Code and Paper Understanding (Phase 1), Idea Library Construction (Phase 2), and Iterative Optimization Loop (Phase 3). Compared with evolutionary optimization methods such as AlphaEvolve"
              - generic [ref=e1009]:
                - text: "["
                - link "12" [ref=e1010] [cursor=pointer]:
                  - /url: "#bib.bib5"
                - text: "]"
              - text: ", which target single algorithms or mathematical functions, the present system operates on a fundamentally more complex problem space. Unlike the well-defined and bounded search space of a single function in AlphaEvolve, where evaluation oracles are lightweight and deterministic, our system must optimize full research code repositories that are multi-file, multi-module, and highly interdependent. Each evaluation involves executing an entire machine learning experiment, subject to the strict boundaries of the original paper’s experimental setup. A more fundamental distinction lies in the candidate generation mechanism. While traditional evolutionary approaches can rely on exhaustive or massively parallel search, the optimization space of a research paper implementation is open and knowledge-intensive. Determining promising directions, assessing the potential impact of modifications, and introducing external techniques without violating core methodology all require expert-level reasoning."
            - paragraph [ref=e1012]: "The system leverages a LLM as a proposal generator, combining two essential capabilities: (i) deep understanding of the entire codebase, including cross-file dependencies, data flow across algorithmic stages, and evaluation protocol constraints; and (ii) broad awareness of state-of-the-art research, enabling the identification of structural bottlenecks and retrieval of relevant improvements from the literature. Both are indispensable: without code comprehension, proposals cannot be implemented; without research context, the search reduces to local parameter tuning with limited potential for substantial gains."
            - paragraph [ref=e1014]: Phase 0 executes essential initialization tasks. The optimizer launches a Docker container for the target paper, initializes a lightweight version control layer within the repository, and commits the unmodified code under the _baseline tag. The full evaluation pipeline is then executed to obtain empirically measured baseline metrics. This step is critical, as reported results in the original paper often diverge from reproducible values due to software, hardware, or environmental differences. All subsequent optimization objectives are anchored to these measured baselines, which are recorded in a structured scores.jsonl ledger as iteration 0, providing a reproducible reference for later comparisons.
            - paragraph [ref=e1016]: Phase 1 systematically explores the repository structure, inspects evaluation scripts, identifies algorithmic branches, maps the full reasoning pipeline, and estimates runtime per evaluation. The output is a structured code_analysis.md, serving as a cognitive map of the repository. This phase also requires explicit enumeration of hard constraints, i.e., invariants that cannot be modified, which are recorded to guide subsequent agent decisions and to provide verifiable references for the AgentSupervisor.
            - paragraph [ref=e1018]: "Phase 2 constructs the initial Idea Library, a structured document listing candidate optimization directions. Each idea is annotated with type (PARAM/CODE/ALGO), priority, risk level, and implementation assumptions. Ideas are organized at three granularity levels: micro (single parameter adjustments), meso (function-level algorithmic improvements), and macro (pipeline-stage restructuring). The initial library contains at least ten ideas, prioritized by feasibility and optimization potential, interleaving low-risk parameter tuning with higher-risk structural modifications. A redline audit is conducted at the end of Phase 2, verifying each idea against the complete set of hard constraints and marking any violations as REJECTED. Only ideas labeled CLEARED proceed to execution scheduling."
            - paragraph [ref=e1020]: "Phase 3 implements the iterative optimization loop, comprising seven mandatory steps per iteration: (0) Pre-Iteration Reflection, (1) Idea Selection, (2) Git Snapshot, (3) Code Implementation, (4) Evaluation, (5) Debugging, (6) Result Recording, and (7) Idea Library Update. The loop continues for up to MAX_ITERATIONS, terminating early if the primary metric surpasses a predefined threshold."
            - paragraph [ref=e1022]: "A key design feature is the bifurcation between the Normal Path and the Leap Path during pre-iteration reflection. The agent inspects the types of ideas executed in the three most recent iterations: if all were PARAM-type adjustments, the current iteration is forced into the Leap Path, requiring a novel, structurally informed optimization idea derived from historical execution, rather than selection from existing ideas. This anti-stagnation mechanism prevents repeated exploration in low-dimensional parameter space and actively seeks structural breakthroughs when marginal gains from simple tuning are exhausted. Structural modifications introduced via the Leap Path are granted a Honeymoon Period: if the initial result does not improve the best score, the system allows up to five subsequent iterations to explore and debug on the Leap-derived state before rolling back to the pre-Leap optimum. This ensures that potentially high-impact structural changes are adequately evaluated without premature rejection."
            - paragraph [ref=e1024]: An internal version control layer within the container underpins Scheduler correctness. Prior to any code modification (Step 2), the agent commits the current work tree and records the PRE_COMMIT hash. In case of evaluation crashes or exhausted debug budget, a precise git checkout restores the previous state, preventing partial or contaminated changes from propagating. When a new optimum is found, the record_score.sh script atomically advances the _best tag to the corresponding commit. In the finalization phase (Phase 4), the container is restored to the _best state, the final evaluation is executed, and the host generates a Docker image autosota/paper:optimized and exports the complete repository via docker cp, ensuring reproducibility and completeness of results.
          - generic [ref=e1025]:
            - heading "2.8.2 Resource Management" [level=4] [ref=e1026]:
              - generic [ref=e1027]: 2.8.2
              - text: Resource Management
            - paragraph [ref=e1029]: At the system level, the AgentScheduler manages a global resource framework for multiple papers and multiple GPUs. The framework uses a two-GPU unit as the basic scheduling granularity, with each unit running at most one active task at any given time. Papers awaiting processing form a unified global task queue, and the scheduler continuously assigns tasks from the queue to available compute units in order.
            - paragraph [ref=e1031]: Persistent tracking of the scheduling state is a key mechanism for ensuring reliable long-duration experiments. After each task assignment or completion, the AgentScheduler immediately writes the current state to disk, recording each paper’s progress stage, assigned compute unit, process ID, and task start time. In the event of an unexpected server crash or forced termination of the scheduler, the system can restart in recovery mode, during which the scheduler automatically scans the persisted state, verifies whether each “running” process is still active, and infers the final results of terminated tasks by inspecting the corresponding output files. The paper status is updated accordingly, compute units are freed, and task dispatch resumes automatically, enabling uninterrupted continuation of multi-day or multi-week experiments without manual intervention.
            - paragraph [ref=e1033]: "Task execution is designed for long-term, unattended operation. Each task is launched in an independent process, fully decoupled from the scheduler, ensuring that ongoing tasks are unaffected if the user disconnects or the scheduler exits. For optimization tasks, the startup procedure automatically performs necessary preparation: if a paper has not completed its initial configuration, the system uses its replication Docker image and logs as context to trigger a configuration discovery process, extracting evaluation commands, baseline metrics, and environment parameters. GPU assignments are dynamically written into the paper’s configuration to match the allocated compute unit, after which the optimization agent is launched autonomously. This design removes static bindings between compute units and papers, allowing any unit to immediately pick up the next queued task once the current one completes, achieving instant resource reuse without manual reconfiguration."
            - paragraph [ref=e1035]: "Upon task completion, the scheduler performs unified finalization: it verifies task success by checking the existence and content of output artifacts, automatically commits the optimized code as a new Docker image layer for successful tasks, and exports a host-accessible copy of the code. All containers created during the experiment are cleaned up, and GPU memory is released for subsequent tasks. This combination of dynamic assignment, artifact-driven completion verification, and immediate resource recycling ensures near-full utilization of compute resources throughout the experiment, enabling fully automated large-scale execution with zero manual intervention."
        - generic [ref=e1036]:
          - 'heading "2.9 AgentSupervisor: Preventing Invalid Optimization Behaviors" [level=3] [ref=e1037]':
            - generic [ref=e1038]: "2.9"
            - text: "AgentSupervisor: Preventing Invalid Optimization Behaviors"
          - paragraph [ref=e1040]: "The AgentSupervisor addresses a critical and non-trivial challenge in automated research systems: ensuring that long-horizon optimization proceeds under consistent, comparable, and methodologically valid conditions. In our framework, the AgentScheduler continuously proposes and evaluates modifications to the codebase. However, without proper constraints, an unconstrained code-modifying agent may exploit unintended degrees of freedom and artificially inflate performance metrics, without improving the underlying method itself. For instance, it may alter evaluation protocols, introduce test data leakage into training, relax dimensional or problem constraints, or even hard-code expected outputs. Such “improvements” are clearly unacceptable. In practice, our early experiments reveal that these behaviors occur more frequently than anticipated in autonomous optimization settings. Therefore, the role of the AgentSupervisor is essential. It enforces comparability in a principled manner: any claimed performance gain must be evaluated under identical experimental settings, consistent methodological constraints, and the same evaluation pipeline. Any optimization that violates these conditions is considered invalid and devoid of scientific value."
          - paragraph [ref=e1042]: "The core mechanism of the Agent Supervisor is the Red Line System, which is a set of six non-negotiable constraints that are enforced at multiple points in the optimization workflow:"
          - list [ref=e1044]:
            - listitem [ref=e1045]:
              - text: •
              - paragraph [ref=e1047]:
                - text: "R1 — Evaluation Metric Parameters Must Not Change: The parameterization of evaluation metrics must remain fixed. For retrieval tasks, the value of"
                - math [ref=e1048]:
                  - generic [ref=e1050]: k
                - text: in recall@k must not be modified; for temporal or sequential tasks, the context window length and history window length used during evaluation must be preserved; aggregation strategies (such as averaging across multiple runs) must not be replaced by best-of-N or maximum value reporting.
            - listitem [ref=e1051]:
              - text: •
              - paragraph [ref=e1053]: "R2 — Evaluation Script Integrity Must Be Maintained: The evaluation script, score aggregation logic, and metric computation code must not be modified. Optimization operations must occur entirely upstream of the evaluation boundary."
            - listitem [ref=e1054]:
              - text: •
              - paragraph [ref=e1056]: "R3 — Integrity of Algorithm Outputs Must Not Be Violated: Model predictions and inference outputs must come from the actual model inference process. Overwriting, fabricating, or hard-coding predictions, even if it results in immediate metric gains, is strictly prohibited."
            - listitem [ref=e1057]:
              - text: •
              - paragraph [ref=e1059]: "R4 — No Unfair Trade-offs Between Metric Dimensions: The improvement in the primary optimization target metric must not come at the expense of significant degradation in other reported metrics. The system is required to report all metrics in each iteration, and cross-metric trade-offs are explicitly constrained."
            - listitem [ref=e1060]:
              - text: •
              - paragraph [ref=e1062]: "R5 — Dataset Integrity Must Be Preserved: The train/test split must strictly follow the definition in the original paper. Test data must not be incorporated into training in any form, including fine-tuning, calibration, or data augmentation."
            - listitem [ref=e1063]:
              - text: •
              - paragraph [ref=e1065]: "R6 — No Modification of the Dataset: Training or test data must not be altered, filtered, re-labeled, or re-sampled in any way that would change the evaluation distribution."
            - listitem [ref=e1066]:
              - text: •
              - paragraph [ref=e1068]: "R7 — Paper-Specific Constraints Must Be Explicitly Identified and Strictly Followed: Each paper’s experimental setup introduces unique comparability requirements that may not be immediately evident from the general rules. For example, a temporal action prediction paper may have a specific history window length, which is part of the task definition itself; a text retrieval paper may define a context window size that influences the retrieval granularity. These key constraints must be explicitly identified and formalized as constraints before optimization begins."
          - paragraph [ref=e1070]: These constraints are enforced not through single-point checks but through a multi-layered supervision mechanism that spans the entire optimization process.
          - list [ref=e1072]:
            - listitem [ref=e1073]:
              - text: •
              - paragraph [ref=e1075]: "First Layer: Phase 1 Stage — The agent is explicitly required to identify all relevant hard constraints for the specific paper at hand and enumerate them in a dedicated “hard constraints/red line” list in the code_analysis.md document (i.e., generating R7). This forces the model to reason about the evaluation boundaries before generating any optimization ideas, rooting the constraint set in the specific context of the paper rather than relying solely on generic rules."
            - listitem [ref=e1076]:
              - text: •
              - paragraph [ref=e1078]: "Second Layer: After Phase 2 — After the initial Idea library is generated, a mandatory Red Line Audit is performed. The agent must construct an audit table in the idea_library.md document and verify each generated idea against all seven red lines. Any idea violating even a single constraint is immediately marked as REJECTED (Red Line Violation) and annotated with the violated rule. Only ideas marked as CLEARED can enter the Phase 3 execution cycle. This pre-execution filter ensures that no violating ideas are allowed to slip through into the optimization process."
            - listitem [ref=e1079]:
              - text: •
              - paragraph [ref=e1081]: "Third Layer: When the Leap Path in Phase 3 is Triggered — The idea synthesis process includes an explicit red line check for each candidate module. For each of the three innovative candidate solutions, the agent is required to check all eight constraints and discard any violating candidates. This secondary check is necessary because Leap ideas are dynamically generated and did not exist during Phase 2’s audit."
            - listitem [ref=e1082]:
              - text: •
              - paragraph [ref=e1084]: "Fourth Layer: Global Rule Section in Main Prompt — The constraints are enforced as the highest-priority operational principles, stated as “absolute prohibitions, with no exceptions under any circumstances.” This phrasing is deliberate: it sends a signal to the model that these constraints take precedence over the primary optimization objectives, preventing the rationalization of violating constraints for the sake of pursuing better metrics."
          - paragraph [ref=e1086]: The constraints of the AgentSupervisor serve as the boundaries for the search conducted by the AgentScheduler. This is not a conservative restriction on the agent’s capabilities but a principled norm for defining “what constitutes a legitimate improvement.” Within these boundaries, the Agent Scheduler is free to explore; outside of these boundaries, regardless of the magnitude of metric improvements, the results are not considered valid.
