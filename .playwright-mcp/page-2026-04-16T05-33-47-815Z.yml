              - text: We select Predicting mutational effects on protein binding from folding energy as the Biology case because it illustrates AutoSOTA’s ability to look beyond the core neural architecture and exploit orthogonal, physics-based signals through data-level integration. The task involves predicting the impact of mutations on protein-protein binding affinity (
