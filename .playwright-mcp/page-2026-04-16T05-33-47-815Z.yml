            - emphasis [ref=e875]: with what evidential support
            - text: .
          - paragraph [ref=e877]: The search beyond local code inspection is broadened by injecting external research expertise. Instead of relying solely on the provided repository, this module queries an external, research-capable model to generate a task-relevant prior report grounded in SOTA literature patterns, empirical heuristics, and community best practices. By synthesizing high-level insights from the broader field, this stage ensures that the candidate space includes profound structural innovations and domain-aware possibilities that are not immediately visible from the static codebase alone.
          - paragraph [ref=e879]: "To ensure the generated ideas are both executable and scientifically valid, this layer anchors hypotheses to the concrete task instance through a multi-dimensional alignment process. We enforce a red-line system to filter out any proposals that might violate the experimental integrity. Alignment is strictly maintained across four dimensions: Metric Alignment: Hypotheses must target the specific objectives reported in the paper rather than generic performance metrics. Implementation Alignment: Proposals must remain plausible relative to the actual capabilities of the reproduced environment and codebase. Constraint Alignment: This preserves critical invariants, such as evaluation logic, dataset splits, and the core methodology’s theoretical boundaries. Lever Alignment: High-value optimization “levers” are identified to connect abstract knowledge to concrete intervention points in the code."
