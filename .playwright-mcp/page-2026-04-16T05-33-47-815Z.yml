            - text: ": the agent may synthesize missing glue logic, repair file-system assumptions, or reconstruct non-core scripts, but it must do so under the constraint that the original evaluation protocol, dataset split, and reported target setting remain unchanged. In this sense, AgentInit is not simply a deployment module; it is the stage that transforms fragile academic software into a minimally runnable but scientifically faithful experimental baseline."
          - paragraph [ref=e675]: Therefore, the output of AgentInit is not only a configured environment, but a fully instantiated execution interface for downstream replication. This interface includes a validated containerized runtime, a prepared repository state, an explicit execution plan, and a set of discovered commands and resources that define how the baseline experiment should be launched. By converting brittle and heterogeneous paper repositories into structured executable states, AgentInit provides the necessary substrate for reliable monitoring, debugging, and later-stage optimization.
        - generic [ref=e676]:
