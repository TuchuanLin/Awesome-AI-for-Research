    - heading "About" [level=2] [ref=e697]
    - generic [ref=e698]:
      - paragraph [ref=e699]: Post-Train Bench measures AI R&D automation by testing whether AI agents can successfully post-train other language models. Each agent receives 4 base models (Qwen 3 1.7B, Qwen 3 4B, SmolLM3-3B, and Gemma 3 4B), access to an H100 GPU, and a 10-hour time limit to improve model performance through post-training
      - generic [ref=e700]:
        - heading "Experimental Setup" [level=3] [ref=e701]
        - list [ref=e702]:
          - listitem [ref=e703]:
            - strong [ref=e704]: "Models:"
            - text: Qwen 3 1.7B, Qwen 3 4B, SmolLM3-3B, Gemma 3 4B
          - listitem [ref=e705]:
            - strong [ref=e706]: "Hardware:"
            - text: Single H100 GPU per agent
          - listitem [ref=e707]:
            - strong [ref=e708]: "Time Limit:"
            - text: 10 hours per agent
          - listitem [ref=e709]:
            - strong [ref=e710]: "Evaluation:"
            - text: Weighted average score across 7 benchmarks
          - listitem [ref=e711]:
            - strong [ref=e712]: "Agent scaffolds:"
            - text: Native CLI scaffolds (Claude Code for Claude models, Codex CLI for OpenAI, Gemini CLI for Gemini)
  - generic [ref=e714]:
