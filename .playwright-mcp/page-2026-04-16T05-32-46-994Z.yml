  - generic [ref=e32]:
    - heading "Leaderboard" [level=2] [ref=e33]
    - generic [ref=e34]:
      - paragraph [ref=e37]:
        - superscript [ref=e38]: "1"
        - text: The weighted average is taken across all post-trained LLMs (Qwen 3 1.7B, Qwen 3 4B, SmolLM3-3B, Gemma 3 4B) and benchmarks (AIME 2025, Arena Hard, BFCL, GPQA Main, GSM8K, HealthBench, HumanEval). For each run, we ask a CLI agent to maximize the performance of a specific base LLM on a specific benchmark.
      - paragraph [ref=e39]:
        - superscript [ref=e40]: "2"
        - text: "\"Official Instruct Models\" refers to the officially post-trained versions of each base model:"
        - link "Qwen3-1.7B" [ref=e41] [cursor=pointer]:
          - /url: https://huggingface.co/Qwen/Qwen3-1.7B
        - text: ","
        - link "Qwen3-4B" [ref=e42] [cursor=pointer]:
          - /url: https://huggingface.co/Qwen/Qwen3-4B
        - text: ","
        - link "SmolLM3-3B" [ref=e43] [cursor=pointer]:
          - /url: https://huggingface.co/HuggingFaceTB/SmolLM3-3B
        - text: ", and"
        - link "Gemma-3-4B-IT" [ref=e44] [cursor=pointer]:
          - /url: https://huggingface.co/google/gemma-3-4b-it
        - text: . Not directly comparable to agents since their training usually exceeds the 10h + 1 GPU constraint.
      - paragraph [ref=e45]:
        - superscript [ref=e46]: †
        - text: "Reprompted: the agent was manually prompted to continue each time it stopped before the time budget expired."
