      - generic [ref=e22]: Bench
    - paragraph [ref=e23]: Measuring how well AI agents can post-train language models
    - paragraph [ref=e25]: Can AI agents improve performance of base LLMs? We give each agent 4 small target LLMs, an H100 GPU, and 10 hours to post-train them.
